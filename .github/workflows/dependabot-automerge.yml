name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.2.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Wait for status checks
        uses: WyriHaximus/github-action-wait-for-status@v1.4
        id: waitforstatuschecks
        with:
          ignoreActions: dependabot
          checkInterval: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Auto-approve and merge patch/minor updates
        if: |
          steps.waitforstatuschecks.outputs.status == 'success' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          ) &&
          (
            contains(steps.metadata.outputs.dependency-names, 'typescript') ||
            contains(steps.metadata.outputs.dependency-names, '@types/') ||
            contains(steps.metadata.outputs.dependency-names, '@typescript-eslint/') ||
            contains(steps.metadata.outputs.dependency-names, 'eslint') ||
            contains(steps.metadata.outputs.dependency-names, '@radix-ui/') ||
            contains(steps.metadata.outputs.dependency-names, 'tailwind') ||
            contains(steps.metadata.outputs.dependency-names, 'lucide-react') ||
            contains(steps.metadata.outputs.dependency-names, '@azure/') ||
            contains(steps.metadata.outputs.dependency-names, 'axios') ||
            contains(steps.metadata.outputs.dependency-names, 'date-fns') ||
            contains(steps.metadata.outputs.dependency-names, 'uuid') ||
            contains(steps.metadata.outputs.dependency-names, 'clsx') ||
            contains(steps.metadata.outputs.dependency-names, 'sonner') ||
            contains(steps.metadata.outputs.dependency-names, 'autoprefixer') ||
            contains(steps.metadata.outputs.dependency-names, 'postcss')
          )
        run: |
          # Approve the PR
          gh pr review --approve "$PR_URL"
          # Enable auto-merge with squash
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major version updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Major version update detected!** Please review this change carefully before merging as it may contain breaking changes."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
