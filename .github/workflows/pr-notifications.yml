name: PR Notifications

on:
  pull_request:
    types: [opened, closed, review_requested, ready_for_review, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send Discord Notification
        env:
          DISCORD_PR_WEBHOOK: ${{ secrets.DISCORD_SPOTCLOUD_PR_WEBHOOK_SECRET }}
          PR_ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_COMMENTS: ${{ github.event.pull_request.comments }}
          PR_REVIEW_COMMENTS: ${{ github.event.pull_request.review_comments }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ', ') }}
          REVIEWER: ${{ github.event.requested_reviewer.login || github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
        run: |
          chmod +x .github/scripts/pr-notify.sh
          .github/scripts/pr-notify.sh
        continue-on-error: true
